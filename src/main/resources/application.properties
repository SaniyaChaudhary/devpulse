spring.application.name=devpulse
server.port=8080

# MongoDB (your actual DB)
spring.data.mongodb.uri=mongodb://localhost:27017/devpulse

# Disable SQL auto-config (IMPORTANT)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Optional: remove Redis for now (unless installed)
# spring.cache.type=redis
# spring.data.redis.url=redis://localhost:6379

# OAuth (ok to keep)
spring.security.oauth2.client.registration.github.client-id=YOUR_GITHUB_CLIENT_ID
spring.security.oauth2.client.registration.github.client-secret=YOUR_GITHUB_CLIENT_SECRET
spring.security.oauth2.client.registration.github.scope=read:user,repo

# Mail (optional, ignore for now)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

management.endpoints.web.exposure.include=health,info